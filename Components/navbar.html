  <!-- Download Game Button JS: scoped only to this button. Hamburger/menu behavior still comes from your existing JS/style.css setup. -->
  <script>
    (function () {
      var downloadButton = document.getElementById('ssiavc-download-game-button');
      if (!downloadButton) return;

      var ITCH_DOWNLOAD_URL = 'https://tenstudiosbc.itch.io/ssia-vanguard-chronicles';
      var ANDROID_PACKAGE = 'com.tsbcgames.ssiavc';
      var ANDROID_SCHEME_URL = 'ssiavc://play';
      var PC_PROTOCOL_URL = 'ssiavc://play';
      var FALLBACK_DELAY_ANDROID = 1500;
      var FALLBACK_DELAY_PC = 2200;

      function openDownloadFallback() {
        window.location.assign(ITCH_DOWNLOAD_URL);
      }

      function attemptOpenWithFallback(openUrl, fallbackDelay) {
        var pageWasHidden = false;
        var fallbackTimer = null;

        function cleanup() {
          window.removeEventListener('pagehide', markOpened);
          window.removeEventListener('blur', markOpened);
          document.removeEventListener('visibilitychange', handleVisibilityChange);
        }

        function markOpened() {
          pageWasHidden = true;
          if (fallbackTimer) window.clearTimeout(fallbackTimer);
          cleanup();
        }

        function handleVisibilityChange() {
          if (document.hidden) markOpened();
        }

        window.addEventListener('pagehide', markOpened, { once: true });
        window.addEventListener('blur', markOpened, { once: true });
        document.addEventListener('visibilitychange', handleVisibilityChange);

        fallbackTimer = window.setTimeout(function () {
          cleanup();
          if (!pageWasHidden) openDownloadFallback();
        }, fallbackDelay);

        try {
          window.location.href = openUrl;
        } catch (error) {
          cleanup();
          if (fallbackTimer) window.clearTimeout(fallbackTimer);
          openDownloadFallback();
        }
      }

      function isAndroid() {
        return /Android/i.test(navigator.userAgent || '');
      }

      function isWindowsDesktop() {
        return /Windows NT/i.test(navigator.userAgent || '');
      }

      function handleDownloadButtonClick() {
        if (isAndroid()) {
          var encodedFallback = encodeURIComponent(ITCH_DOWNLOAD_URL);

          /*
            Chrome/Android intent format:
            - If SSIA:VC Android app exists, it opens the app package.
            - If not installed, browser_fallback_url sends the user to itch.io.
          */
          var androidIntentUrl =
            'intent://play#Intent;' +
            'scheme=ssiavc;' +
            'package=' + ANDROID_PACKAGE + ';' +
            'S.browser_fallback_url=' + encodedFallback + ';' +
            'end';

          attemptOpenWithFallback(androidIntentUrl, FALLBACK_DELAY_ANDROID);
          return;
        }

        if (isWindowsDesktop()) {
          /*
            Browser pages cannot directly search for or open C:/Users/.../SSIAVC/Game.exe.
            For full PC launching, the Windows launcher should register ssiavc://play.
            If that protocol is not installed, this falls back to itch.io.
          */
          attemptOpenWithFallback(PC_PROTOCOL_URL, FALLBACK_DELAY_PC);
          return;
        }

        /* Secondary attempt for mobile browsers that support custom schemes but not Android intents. */
        if (/Mobile|Tablet|iPhone|iPad|iPod/i.test(navigator.userAgent || '')) {
          attemptOpenWithFallback(ANDROID_SCHEME_URL, FALLBACK_DELAY_ANDROID);
          return;
        }

        openDownloadFallback();
      }

      downloadButton.addEventListener('click', handleDownloadButtonClick);
    })();
  </script>
