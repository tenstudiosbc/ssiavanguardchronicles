  <!-- Play Button JS: scoped only to the Play button. Hamburger/menu behavior still comes from your existing JS/style.css setup. -->
  <script>
    (function () {
      var playButton = document.getElementById('ssiavc-play-button');
      if (!playButton) return;

      var ITCH_DOWNLOAD_URL = 'https://tenstudiosbc.itch.io/ssia-vanguard-chronicles';
      var ANDROID_PACKAGE = 'com.tsbcgames.ssiavc';
      var PC_PROTOCOL_URL = 'ssiavc://play';

      function openDownloadFallback() {
        window.location.href = ITCH_DOWNLOAD_URL;
      }

      function attemptOpenWithFallback(openUrl, fallbackDelay) {
        var didLeavePage = false;
        var fallbackTimer;

        function markLeftPage() {
          didLeavePage = true;
          window.clearTimeout(fallbackTimer);
        }

        window.addEventListener('blur', markLeftPage, { once: true });

        document.addEventListener('visibilitychange', function onVisibilityChange() {
          if (document.hidden) {
            markLeftPage();
            document.removeEventListener('visibilitychange', onVisibilityChange);
          }
        });

        fallbackTimer = window.setTimeout(function () {
          if (!didLeavePage) openDownloadFallback();
        }, fallbackDelay || 1800);

        window.location.href = openUrl;
      }

      function isAndroid() {
        return /Android/i.test(navigator.userAgent || '');
      }

      function isWindowsDesktop() {
        return /Windows NT/i.test(navigator.userAgent || '');
      }

      function handlePlayButtonClick() {
        if (isAndroid()) {
          var encodedFallback = encodeURIComponent(ITCH_DOWNLOAD_URL);
          var androidIntentUrl = 'intent://play#Intent;scheme=ssiavc;package=' + ANDROID_PACKAGE + ';S.browser_fallback_url=' + encodedFallback + ';end';
          attemptOpenWithFallback(androidIntentUrl, 1700);
          return;
        }

        if (isWindowsDesktop()) {
          attemptOpenWithFallback(PC_PROTOCOL_URL, 2000);
          return;
        }

        openDownloadFallback();
      }

      playButton.addEventListener('click', handlePlayButtonClick);
    })();
  </script>
