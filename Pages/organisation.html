  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Chakra+Petch:wght@300;400;500;600;700&family=Exo+2:wght@100;300;400;700;900&display=swap"

  <link rel="stylesheet" href="../Styles/characters.css">

  <!-- PAGE SPECIFIC CSS -->
  <!-- Kept inside this file so you only need organisation.html + factions.js. -->
  <style>

    /* PAGE SAFETY: keeps content above animated background/canvas on mobile browsers */
    #bg-canvas {
      pointer-events: none;
    }

    #navbar-container,
    .organisation-header,
    .section-wrapper,
    #footer-container,
    #toaster {
      position: relative;
      z-index: 2;
    }

    .organisation-header {
      min-height: 32vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 1.5rem 3.2rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(0, 245, 212, 0.13), transparent 42%),
        linear-gradient(180deg, rgba(5, 7, 13, 0.15), rgba(5, 7, 13, 0.76));
      border-bottom: 1px solid rgba(0, 245, 212, 0.12);
    }

    .organisation-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0, 245, 212, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 212, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: linear-gradient(to bottom, black, transparent 92%);
      mask-image: linear-gradient(to bottom, black, transparent 92%);
      pointer-events: none;
    }

    .organisation-header .header-content {
      position: relative;
      z-index: 3;
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .organisation-header .header-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      max-width: 100%;
      padding: 0.45rem 0.85rem;
      border: 1px solid rgba(0, 245, 212, 0.25);
      border-radius: 999px;
      background: rgba(0, 245, 212, 0.08);
      color: var(--accent, #00f5d4);
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .organisation-header .header-title {
      color: var(--text, #ffffff);
      font-family: "Exo 2", "Rajdhani", sans-serif;
      font-size: clamp(2.15rem, 8vw, 4.6rem);
      line-height: 0.95;
      margin: 0;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(0, 245, 212, 0.16);
    }

    .organisation-header .header-subtitle {
      color: var(--text-dim, #8da9c4);
      font-family: "Chakra Petch", sans-serif;
      font-size: clamp(0.95rem, 3vw, 1.25rem);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin: 1rem auto 0;
      max-width: 760px;
    }

    .organisation-section {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .organisations-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1 1 360px;
      min-width: min(100%, 280px);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent, #00f5d4);
      font-family: "Chakra Petch", sans-serif;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border, rgba(0, 245, 212, 0.12));
      background: rgba(8, 14, 24, 0.78);
      color: var(--text, #ffffff);
      border-radius: 14px;
      padding: 0.95rem 1rem 0.95rem 2.7rem;
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.06em;
      outline: none;
    }

    .search-wrap input:focus {
      border-color: var(--border-bright, rgba(0, 245, 212, 0.35));
      box-shadow: 0 0 28px rgba(0, 245, 212, 0.09);
    }

    .organisation-counter {
      border: 1px solid var(--border-bright, rgba(0, 245, 212, 0.35));
      background: rgba(8, 14, 24, 0.72);
      color: var(--accent, #00f5d4);
      padding: 0.8rem 1rem;
      border-radius: 14px;
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(0, 245, 212, 0.08);
      white-space: nowrap;
    }

    .organisations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 1.5rem;
    }

    .faction-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border, rgba(0, 245, 212, 0.12));
      background:
        linear-gradient(145deg, rgba(12, 20, 36, 0.92), rgba(5, 7, 13, 0.94)),
        radial-gradient(circle at top right, rgba(0, 148, 255, 0.12), transparent 42%);
      border-radius: 22px;
      min-height: 100%;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
    }

    .faction-card:hover {
      transform: translateY(-6px);
      border-color: var(--border-bright, rgba(0, 245, 212, 0.35));
      box-shadow: 0 24px 55px rgba(0, 245, 212, 0.08);
    }

    .faction-accent-bar {
      height: 5px;
      width: 100%;
      background: linear-gradient(90deg, var(--accent, #00f5d4), var(--accent2, #0094ff));
    }

    .faction-card-clickable {
      border: 0;
      width: 100%;
      height: 100%;
      padding: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .faction-card-inner {
      padding: 1.25rem;
    }

    .faction-logo-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .faction-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(0, 245, 212, 0.2);
      background: rgba(0, 245, 212, 0.08);
      box-shadow: inset 0 0 22px rgba(0, 245, 212, 0.06);
      overflow: hidden;
    }

    .faction-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .faction-logo-placeholder {
      font-family: "Chakra Petch", sans-serif;
      font-size: 1.5rem;
      color: var(--accent, #00f5d4);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .faction-type {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 0.34rem 0.64rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 245, 212, 0.18);
      background: rgba(0, 245, 212, 0.08);
      color: var(--accent, #00f5d4);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-name {
      font-family: "Exo 2", "Rajdhani", sans-serif;
      font-size: clamp(1.35rem, 3vw, 1.8rem);
      margin: 0.5rem 0 0.3rem;
      line-height: 1.1;
      color: var(--text, #ffffff);
    }

    .faction-short-name {
      color: var(--text-dim, #8da9c4);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.94rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .faction-info-list {
      display: grid;
      gap: 0.7rem;
      margin: 1rem 0;
    }

    .faction-info-row {
      display: grid;
      gap: 0.25rem;
    }

    .faction-label {
      color: var(--text-muted, #5a7b9c);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .faction-value {
      color: var(--text, #ffffff);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .faction-summary {
      color: var(--text-dim, #8da9c4);
      line-height: 1.6;
      margin: 1rem 0 0;
    }

    .faction-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .faction-tag {
      border: 1px solid rgba(0, 148, 255, 0.2);
      background: rgba(0, 148, 255, 0.08);
      color: #cfefff;
      padding: 0.32rem 0.55rem;
      border-radius: 9px;
      font-size: 0.78rem;
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.04em;
    }

    .faction-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-top: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-muted, #5a7b9c);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .faction-view-profile {
      color: var(--accent, #00f5d4);
      font-weight: 700;
    }

    .faction-empty-state {
      grid-column: 1 / -1;
      border: 1px dashed rgba(0, 245, 212, 0.3);
      color: var(--text-dim, #8da9c4);
      text-align: center;
      border-radius: 20px;
      padding: 2rem;
      background: rgba(8, 14, 24, 0.55);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-modal-root {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 9999;
    }

    .faction-modal-root.active {
      display: flex;
    }

    .faction-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
    }

    .faction-modal {
      position: relative;
      width: min(900px, 100%);
      max-height: min(88vh, 900px);
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(0, 245, 212, 0.28);
      background:
        linear-gradient(145deg, rgba(8, 14, 24, 0.98), rgba(5, 7, 13, 0.98)),
        radial-gradient(circle at top right, rgba(0, 245, 212, 0.16), transparent 38%);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      color: var(--text, #ffffff);
    }

    .faction-modal-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .faction-modal-title-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .faction-modal-title {
      margin: 0;
      font-family: "Exo 2", sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.35rem);
      line-height: 1.05;
    }

    .faction-modal-subtitle {
      margin: 0.35rem 0 0;
      color: var(--text-dim, #8da9c4);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-modal-close {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 212, 0.2);
      background: rgba(0, 245, 212, 0.08);
      color: var(--accent, #00f5d4);
      cursor: pointer;
      font-size: 1.2rem;
      transition: transform 0.2s ease, background 0.2s ease;
      flex: 0 0 auto;
    }

    .faction-modal-close:hover {
      transform: scale(1.05);
      background: rgba(0, 245, 212, 0.14);
    }

    .faction-modal-body {
      padding: 1.5rem;
      display: grid;
      gap: 1.5rem;
    }

    .faction-modal-summary {
      color: var(--text-dim, #8da9c4);
      line-height: 1.7;
      font-size: 1.02rem;
      margin: 0;
    }

    .faction-modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .faction-detail-box {
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.035);
      border-radius: 16px;
      padding: 1rem;
    }

    .faction-detail-box.full {
      grid-column: 1 / -1;
    }

    .faction-detail-box h3 {
      margin: 0 0 0.7rem;
      color: var(--accent, #00f5d4);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .faction-detail-box p,
    .faction-detail-box li {
      color: var(--text-dim, #8da9c4);
      line-height: 1.65;
    }

    .faction-detail-box p {
      margin: 0;
    }

    .faction-detail-box ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    body.faction-modal-open {
      overflow: hidden;
    }

    @media (max-width: 760px) {
      .organisation-header {
        min-height: auto;
        padding: 6.5rem 1rem 2.35rem;
      }

      .organisations-topbar {
        align-items: stretch;
      }

      .search-wrap,
      .organisation-counter {
        width: 100%;
        flex-basis: 100%;
      }

      .organisations-grid {
        grid-template-columns: 1fr;
      }

      .faction-logo-wrap,
      .faction-modal-title-wrap {
        align-items: flex-start;
      }

      .faction-modal-grid {
        grid-template-columns: 1fr;
      }

      .faction-modal-top,
      .faction-modal-body {
        padding: 1rem;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <canvas id="bg-canvas"></canvas>

  <!-- NAVBAR -->

  <div id="navbar-container"></div>

  <!-- PAGE HERO -->

  <header class="organisation-header">

    <div class="header-content">

      <span class="header-badge">
        CSL INTELLIGENCE INDEX
      </span>

      <h1 class="header-title">
        Organisations Database
      </h1>

      <p class="header-subtitle">
        Agencies • Institutions • Factions • Jurisdictions
      </p>

    </div>

  </header>

  <!-- MAIN CONTENT -->

  <main class="section-wrapper">

    <section class="organisation-section">

      <!-- TOP CONTROLS -->

      <div class="organisations-topbar reveal">

        <!-- SEARCH -->

        <div class="search-wrap">

          <span class="search-icon">
            ⌕
          </span>

          <input
            type="text"
            id="faction-search"
            placeholder="SEARCH_ORGANISATION_DATABASE..."
            autocomplete="off"
          >

        </div>

        <!-- ORGANISATION COUNT -->

        <div class="organisation-counter">

          <span id="faction-count">
            Loading Organisations...
          </span>

        </div>

      </div>

      <!-- GRID -->

      <div
        class="organisations-grid"
        id="factions-container"
      >

        <!-- FACTION / ORGANISATION CARDS INJECTED BY JS -->

      </div>

    </section>

  </main>

  <!-- MODAL ROOT -->
  <!-- Dynamically generated by factions.js -->

  <!-- FOOTER -->

  <div id="footer-container"></div>

  <!-- TOASTER -->

  <div id="toaster"></div>

  <!-- LOADING SCREEN -->

  <div id="page-loader">

    <div class="loader-content">

      <div class="loader-spinner"></div>

      <p>
        CONNECTING TO CSL ORGANISATION DATABASE...
      </p>

    </div>

  </div>

  <!-- SCRIPTS -->

  <script src="../Scripts/component-loader.js"></script>

  <script src="../Scripts/scripts.js"></script>

  <script src="../Scripts/factions.js"></script>

  <!-- PAGE ENHANCEMENTS -->

  <script>

    function updateFactionCount() {

      const cards = document.querySelectorAll(".faction-card");

      const visibleCards = [...cards].filter(
        card => card.style.display !== "none"
      );

      const counter = document.getElementById("faction-count");

      if (!counter) return;

      counter.textContent =
        `${visibleCards.length} ORGANISATIONS LOGGED`;
    }

    function hideOrganisationLoader() {

      const loader = document.getElementById("page-loader");

      if (loader) {

        loader.classList.add("hide");

        setTimeout(() => {
          loader.remove();
        }, 500);

      }

    }

    document.addEventListener("DOMContentLoaded", () => {

      setTimeout(() => {
        updateFactionCount();
        hideOrganisationLoader();
      }, 700);

      setTimeout(() => {
        updateFactionCount();
      }, 1200);

      const search = document.getElementById("faction-search");

      if (search) {
        search.addEventListener("input", updateFactionCount);
      }

    });

    const originalFilterFactions = window.filterFactions;

    window.filterFactions = function () {

      if (originalFilterFactions) {
        originalFilterFactions();
      }

      updateFactionCount();

    };

  </script>

</body>
