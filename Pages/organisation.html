  <style>
    :root {
      --org-bg: #05070d;
      --org-surface: rgba(8, 14, 24, 0.88);
      --org-surface-2: rgba(12, 20, 36, 0.78);

      z-index: 12000 !important;
      pointer-events: auto !important;
      isolation: isolate;
    }

    #navbar-container *,

    #navbar-container a {

    .organisation-header,
    .section-wrapper,

    #toaster {
      position: relative !important;

    .faction-modal-root {
      position: fixed !important;
      z-index: 14000 !important;
    }

    .organisation-page,
    .organisation-header,
    .section-wrapper,
    .organisation-section,
    .organisations-topbar,
    .organisations-grid,
    .reveal {

      transform: none !important;
    }

    #page-loader {

      opacity: 0 !important;
      visibility: hidden !important;

    .organisation-header {
      display: flex !important;

      padding: clamp(5.8rem, 14vw, 8rem) 1.25rem clamp(2.5rem, 7vw, 4rem);
      overflow: hidden;

      background:

    .organisation-header .header-content {

    .organisation-header .header-badge {

<body class="organisation-page">

  <canvas id="bg-canvas"></canvas>

  <div id="navbar-container"></div>

  <header class="organisation-header">
    <div class="header-content">
      <span class="header-badge">CSL ORGANISATION DATABASE</span>
      <h1 class="header-title">Organisations & Factions</h1>
      <p class="header-subtitle">Law Enforcement, Institutions, Agencies, and Faction Dossiers</p>
    </div>
  </header>

  <main class="section-wrapper">
    <section class="organisation-section">
      <div class="organisations-topbar reveal">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="faction-search"
            placeholder="SEARCH_ORGANISATION_DATABASE..."
            autocomplete="off"
          >
        </div>

        <div class="organisation-counter">
          <span id="faction-count">Loading Organisations...</span>
        </div>
      </div>

      <div class="organisations-grid" id="factions-container">
        <div class="faction-js-warning" id="faction-js-warning">
          Loading organisation database...
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>
  <div id="toaster"></div>

  <div id="page-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p>CONNECTING TO CSL ORGANISATION DATABASE...</p>
    </div>
  </div>

  <script src="../Scripts/component-loader.js" defer></script>
  <script src="../Scripts/scripts.js" defer></script>
  <script src="../Scripts/factions.js" defer></script>

  <script defer>
    function updateFactionCount() {
      const cards = document.querySelectorAll(".faction-card");
      const visibleCards = [...cards].filter(card => card.style.display !== "none");
      const counter = document.getElementById("faction-count");
      if (counter) counter.textContent = `${visibleCards.length} ORGANISATIONS LOGGED`;
    }

    function forceOrganisationPageVisible() {
      document.body.classList.remove("loading", "is-loading");
      document.body.style.overflowX = "hidden";
      setupNavbarFallback();

      const loader = document.getElementById("page-loader");
      if (loader) loader.remove();

      document.querySelectorAll(".organisation-header, .section-wrapper, .organisation-section, .organisations-topbar, .organisations-grid, .reveal")
        .forEach(element => {
          element.style.opacity = "1";
          element.style.visibility = "visible";
          element.style.transform = "none";
        });
    }

    function ensureFactionsRendered() {
      forceOrganisationPageVisible();

      if (typeof window.renderFactions === "function") {
        window.renderFactions();
      }

      if (typeof window.filterFactions === "function") {
        window.filterFactions();
      }

      const container = document.getElementById("factions-container");
      const warning = document.getElementById("faction-js-warning");
      const cards = document.querySelectorAll(".faction-card");

      if (warning && cards.length) warning.remove();

      if (container && !cards.length && typeof window.FACTIONS === "undefined") {
        container.innerHTML = `
          <div class="faction-js-warning">
            The organisation database script did not load. Please make sure <strong>factions.js</strong> is uploaded to <strong>/Scripts/factions.js</strong>.
          </div>
        `;
      }

      updateFactionCount();
    }



    function setupNavbarFallback() {
      const navbar = document.getElementById("navbar-container");
      if (!navbar || navbar.dataset.organisationNavFallback === "ready") return;

      navbar.dataset.organisationNavFallback = "ready";

      const menuSelector = ".nav-links, .navbar-links, .nav-menu, .mobile-menu, .menu, nav ul";
      const toggleSelector = ".nav-toggle, .navbar-toggle, .menu-toggle, .mobile-menu-toggle, .mobile-menu-btn, .hamburger, .hamburger-menu, .menu-icon, #menu-toggle, [aria-label*='menu' i], [aria-label*='navigation' i]";

      navbar.addEventListener("click", event => {
        const toggle = event.target.closest(toggleSelector);
        if (!toggle || !navbar.contains(toggle)) return;

        const menu = navbar.querySelector(menuSelector);
        const wasOpen =
          toggle.classList.contains("active") ||
          toggle.classList.contains("open") ||
          (menu && (menu.classList.contains("active") || menu.classList.contains("open") || menu.classList.contains("show"))) ||
          document.body.classList.contains("menu-open");

        /* Let the original navbar script run first. If it does nothing, this fallback toggles it. */
        setTimeout(() => {
          const isOpenAfterOriginal =
            toggle.classList.contains("active") ||
            toggle.classList.contains("open") ||
            (menu && (menu.classList.contains("active") || menu.classList.contains("open") || menu.classList.contains("show"))) ||
            document.body.classList.contains("menu-open");

          const shouldOpen = isOpenAfterOriginal === wasOpen ? !wasOpen : isOpenAfterOriginal;

          toggle.classList.toggle("active", shouldOpen);
          toggle.classList.toggle("open", shouldOpen);
          toggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");

          if (menu) {
            menu.classList.toggle("active", shouldOpen);
            menu.classList.toggle("open", shouldOpen);
            menu.classList.toggle("show", shouldOpen);
          }

          document.body.classList.toggle("menu-open", shouldOpen);
          document.body.classList.toggle("organisation-nav-open", shouldOpen);
        }, 30);
      });

      navbar.addEventListener("click", event => {
        const link = event.target.closest("a");
        if (!link || !navbar.contains(link)) return;
        document.body.classList.remove("organisation-nav-open");
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      forceOrganisationPageVisible();

      const search = document.getElementById("faction-search");
      if (search) search.addEventListener("input", updateFactionCount);

      setTimeout(ensureFactionsRendered, 150);
      setTimeout(ensureFactionsRendered, 650);
      setTimeout(ensureFactionsRendered, 1400);
    });

    window.addEventListener("load", () => {
      setTimeout(ensureFactionsRendered, 100);
    });
  </script>

</body>

</html>
