  <!-- MAIN CSS -->

  <!-- PAGE SPECIFIC CSS -->
  <style>

    :root {
      --org-bg: #05070d;
      --org-panel: rgba(8, 14, 24, 0.88);
      --org-panel-strong: rgba(12, 20, 36, 0.96);
      --org-text: #ffffff;
      --org-dim: #8da9c4;
      --org-muted: #5a7b9c;
      --org-accent: var(--accent, #00f5d4);
      --org-accent-2: var(--accent2, #0094ff);
      --org-border: rgba(0, 245, 212, 0.18);
      --org-border-bright: rgba(0, 245, 212, 0.42);
    }

    html {
      background: var(--org-bg);
    }

    body {
      min-height: 100vh;
      background: var(--org-bg);
      color: var(--text, var(--org-text));
      overflow-x: hidden;
      isolation: isolate;
    }

    /* Keep animated background behind everything and unable to steal clicks. */
    #bg-canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: -1 !important;
      pointer-events: none !important;
    }

    /* Navbar must always stay clickable above organisation page layers. */
    #navbar-container {
      position: relative !important;
      z-index: 50000 !important;
      pointer-events: auto !important;
      isolation: isolate;
    }

    #navbar-container *,
    #navbar-container a,
    #navbar-container button {
      pointer-events: auto !important;
    }

    .organisation-header,
    .section-wrapper,
    #footer-container,
    #toaster {
      position: relative;
      z-index: 2;
    }

    /* Some shared reveal CSS can keep new page elements invisible if the observer misses them. */
    .organisation-header .reveal,
    .organisation-section .reveal,
    .organisations-topbar.reveal,
    .faction-card.reveal,
    .faction-card {
      opacity: 1 !important;
      visibility: visible !important;
      transform: none !important;
    }

    .organisation-header {
      min-height: 46vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(0, 245, 212, 0.14), transparent 42%),
        linear-gradient(180deg, rgba(5, 7, 13, 0.10), rgba(5, 7, 13, 0.92));
    }

    .organisation-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0, 245, 212, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 212, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: linear-gradient(to bottom, black, transparent 90%);
      mask-image: linear-gradient(to bottom, black, transparent 90%);
      pointer-events: none;
    }

    .header-content {
      position: relative;
      z-index: 1;
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--org-border-bright);
      border-radius: 999px;
      background: rgba(0, 245, 212, 0.09);
      color: var(--org-accent);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 0 26px rgba(0, 245, 212, 0.1);
    }

    .header-title {
      margin: 1rem 0 0.4rem;
      font-family: "Exo 2", "Rajdhani", sans-serif;
      font-size: clamp(2.6rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--org-text);
      text-shadow: 0 0 28px rgba(0, 245, 212, 0.15);
    }

    .header-subtitle {
      margin: 0;
      color: var(--org-dim);
      font-family: "Chakra Petch", sans-serif;
      font-size: clamp(1rem, 2vw, 1.35rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-wrapper {
      width: 100%;
      padding: 3.5rem 1.25rem 5rem;
    }

    .organisation-section {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .organisations-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1 1 340px;
      min-width: min(100%, 280px);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--org-accent);
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      z-index: 1;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid var(--org-border);
      background: rgba(8, 14, 24, 0.78);
      color: var(--org-text);
      outline: none;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: inset 0 0 20px rgba(0, 245, 212, 0.035);
    }

    .search-wrap input:focus {
      border-color: var(--org-border-bright);
      box-shadow: 0 0 30px rgba(0, 245, 212, 0.08), inset 0 0 20px rgba(0, 245, 212, 0.04);
    }

    .organisation-counter {
      border: 1px solid var(--org-border-bright);
      background: rgba(8, 14, 24, 0.72);
      color: var(--org-accent);
      padding: 0.9rem 1rem;
      border-radius: 14px;
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(0, 245, 212, 0.08);
      white-space: nowrap;
    }

    .organisations-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 1.5rem;
      align-items: stretch;
      min-height: 180px;
    }

    .faction-card {
      display: block !important;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--org-border);
      background:
        linear-gradient(145deg, rgba(12, 20, 36, 0.94), rgba(5, 7, 13, 0.95)),
        radial-gradient(circle at top right, rgba(0, 148, 255, 0.14), transparent 42%);
      border-radius: 22px;
      min-height: 100%;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
    }

    .faction-card:hover {
      transform: translateY(-6px) !important;
      border-color: var(--org-border-bright);
      box-shadow: 0 24px 55px rgba(0, 245, 212, 0.08);
    }

    .faction-accent-bar {
      height: 5px;
      width: 100%;
      background: linear-gradient(90deg, var(--org-accent), var(--org-accent-2));
    }

    .faction-card-clickable {
      border: 0;
      width: 100%;
      height: 100%;
      padding: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
      display: block;
    }

    .faction-card-inner {
      padding: 1.25rem;
    }

    .faction-logo-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .faction-logo {
      width: 64px;
      height: 64px;
      max-width: 64px;
      max-height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 64px;
      border: 1px solid rgba(0, 245, 212, 0.22);
      background: rgba(0, 245, 212, 0.08);
      box-shadow: inset 0 0 22px rgba(0, 245, 212, 0.06);
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    .faction-modal-title-wrap > .faction-logo {
      width: 76px;
      height: 76px;
      max-width: 76px;
      max-height: 76px;
      flex-basis: 76px;
    }

    .faction-logo img,
    .faction-modal-title-wrap > .faction-logo img {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      object-fit: contain !important;
      object-position: center !important;
      display: block !important;
      image-rendering: auto;
    }

    .faction-logo-placeholder {
      font-family: "Chakra Petch", sans-serif;
      font-size: 1.35rem;
      color: var(--org-accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .faction-type {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 0.34rem 0.64rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 245, 212, 0.18);
      background: rgba(0, 245, 212, 0.08);
      color: var(--org-accent);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-name {
      font-family: "Exo 2", "Rajdhani", sans-serif;
      font-size: clamp(1.35rem, 3vw, 1.8rem);
      margin: 0.5rem 0 0.3rem;
      line-height: 1.1;
      color: var(--org-text);
    }

    .faction-short-name {
      color: var(--org-dim);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.94rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .faction-info-list {
      display: grid;
      gap: 0.7rem;
      margin: 1rem 0;
    }

    .faction-info-row {
      display: grid;
      gap: 0.25rem;
    }

    .faction-label {
      color: var(--org-muted);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .faction-value {
      color: var(--org-text);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .faction-summary {
      color: var(--org-dim);
      line-height: 1.6;
      margin: 1rem 0 0;
    }

    .faction-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .faction-tag {
      border: 1px solid rgba(0, 148, 255, 0.22);
      background: rgba(0, 148, 255, 0.08);
      color: #cfefff;
      padding: 0.32rem 0.55rem;
      border-radius: 9px;
      font-size: 0.78rem;
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.04em;
    }

    .faction-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-top: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--org-muted);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .faction-view-profile {
      color: var(--org-accent);
      font-weight: 700;
    }

    .faction-empty-state {
      grid-column: 1 / -1;
      border: 1px dashed rgba(0, 245, 212, 0.3);
      color: var(--org-dim);
      text-align: center;
      border-radius: 20px;
      padding: 2rem;
      background: rgba(8, 14, 24, 0.68);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-modal-root {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 90000;
    }

    .faction-modal-root.active {
      display: flex;
    }

    .faction-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
    }

    .faction-modal {
      position: relative;
      width: min(900px, 100%);
      max-height: min(88vh, 900px);
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(0, 245, 212, 0.28);
      background:
        linear-gradient(145deg, rgba(8, 14, 24, 0.98), rgba(5, 7, 13, 0.98)),
        radial-gradient(circle at top right, rgba(0, 245, 212, 0.16), transparent 38%);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      color: var(--org-text);
    }

    .faction-modal-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .faction-modal-title-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .faction-modal-title-wrap > div:last-child {
      min-width: 0;
    }

    .faction-modal-title {
      margin: 0;
      font-family: "Exo 2", sans-serif;
      font-size: clamp(1.45rem, 4vw, 2.35rem);
      line-height: 1.05;
      color: var(--org-text);
      overflow-wrap: anywhere;
    }

    .faction-modal-subtitle {
      margin: 0.35rem 0 0;
      color: var(--org-dim);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .faction-modal-close {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 212, 0.2);
      background: rgba(0, 245, 212, 0.08);
      color: var(--org-accent);
      cursor: pointer;
      font-size: 1.2rem;
      flex: 0 0 auto;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .faction-modal-close:hover {
      transform: scale(1.05);
      background: rgba(0, 245, 212, 0.14);
    }

    .faction-modal-body {
      padding: 1.5rem;
      display: grid;
      gap: 1.5rem;
    }

    .faction-modal-summary {
      color: var(--org-dim);
      line-height: 1.7;
      font-size: 1.02rem;
      margin: 0;
    }

    .faction-modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .faction-detail-box {
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.035);
      border-radius: 16px;
      padding: 1rem;
    }

    .faction-detail-box.full {
      grid-column: 1 / -1;
    }

    .faction-detail-box h3 {
      margin: 0 0 0.7rem;
      color: var(--org-accent);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .faction-detail-box p,
    .faction-detail-box li {
      color: var(--org-dim);
      line-height: 1.65;
    }

    .faction-detail-box p {
      margin: 0;
    }

    .faction-detail-box ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    body.faction-modal-open {
      overflow: hidden;
    }

    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 80000;
      display: grid;
      place-items: center;
      background: rgba(5, 7, 13, 0.96);
      transition: opacity 0.35s ease, visibility 0.35s ease;
      pointer-events: auto;
    }

    #page-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: grid;
      place-items: center;
      gap: 1rem;
      color: var(--org-accent);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .loader-spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(0, 245, 212, 0.18);
      border-top-color: var(--org-accent);
      animation: orgSpin 0.9s linear infinite;
    }

    @keyframes orgSpin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 760px) {
      .organisation-header {
        min-height: 42vh;
        padding: 7rem 1rem 3rem;
      }

      .section-wrapper {
        padding: 2.5rem 1rem 4rem;
      }

      .organisations-topbar {
        align-items: stretch;
      }

      .search-wrap,
      .organisation-counter {
        width: 100%;
      }

      .organisation-counter {
        text-align: center;
      }

      .organisations-grid {
        grid-template-columns: 1fr;
      }

      .faction-logo-wrap,
      .faction-modal-title-wrap {
        align-items: flex-start;
      }

      .faction-modal-grid {
        grid-template-columns: 1fr;
      }

      .faction-modal-top,
      .faction-modal-body {
        padding: 1rem;
      }

      .faction-modal-title-wrap > .faction-logo {
        width: 58px;
        height: 58px;
        max-width: 58px;
        max-height: 58px;
        flex-basis: 58px;
      }
    }

  </style>

<body>

  <!-- BACKGROUND -->
  <canvas id="bg-canvas"></canvas>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <!-- PAGE HERO -->
  <header class="organisation-header">
    <div class="header-content">
      <span class="header-badge">CSL INTELLIGENCE INDEX</span>
      <h1 class="header-title">Organisations Database</h1>
      <p class="header-subtitle">Agencies • Institutions • Factions • Jurisdictions</p>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="section-wrapper">
    <section class="organisation-section">

      <div class="organisations-topbar reveal">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="faction-search"
            placeholder="SEARCH_ORGANISATION_DATABASE..."
            autocomplete="off"
          >
        </div>

        <div class="organisation-counter">
          <span id="faction-count">Loading Organisations...</span>
        </div>
      </div>

      <div class="organisations-grid" id="factions-container">
        <div class="faction-empty-state">Loading organisation dossiers...</div>
      </div>

    </section>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- TOASTER -->
  <div id="toaster"></div>

  <!-- LOADING SCREEN -->
  <div id="page-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p>CONNECTING TO CSL ORGANISATION DATABASE...</p>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="../Scripts/component-loader.js"></script>
  <script src="../Scripts/scripts.js"></script>
  <script src="../Scripts/factions.js"></script>

  <!-- PAGE ENHANCEMENTS / SAFETY BOOT -->
  <script>
    (function () {
      const containerId = "factions-container";
      const countId = "faction-count";
      const searchId = "faction-search";

      function removeLoader() {
        const loader = document.getElementById("page-loader");
        if (!loader) return;

        loader.classList.add("hide");
        setTimeout(() => loader.remove(), 450);
      }

      function updateFactionCount() {
        const cards = document.querySelectorAll(".faction-card");
        const visibleCards = [...cards].filter(card => card.style.display !== "none");
        const counter = document.getElementById(countId);

        if (counter) {
          counter.textContent = `${visibleCards.length} ORGANISATIONS LOGGED`;
        }
      }

      function showScriptWarning() {
        const container = document.getElementById(containerId);
        const counter = document.getElementById(countId);
        if (!container || document.querySelector(".faction-card")) return;

        container.innerHTML = `
          <div class="faction-empty-state">
            Organisation database could not load. Make sure factions.js exists at ../Scripts/factions.js
          </div>
        `;

        if (counter) counter.textContent = "0 ORGANISATIONS LOGGED";
      }

      function bootFactions() {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (typeof window.renderFactions === "function") {
          window.renderFactions();
        }

        if (typeof window.filterFactions === "function") {
          window.filterFactions();
        } else {
          updateFactionCount();
        }

        const search = document.getElementById(searchId);
        if (search && !search.dataset.orgSearchBound) {
          search.dataset.orgSearchBound = "true";
          search.addEventListener("input", () => {
            if (typeof window.filterFactions === "function") {
              window.filterFactions();
            }
            updateFactionCount();
          });
        }

        if (!document.querySelector(".faction-card")) {
          setTimeout(showScriptWarning, 800);
        }

        removeLoader();
      }

      function closestToggle(target) {
        if (!target || !target.closest) return null;

        return target.closest(
          "#navbar-container .hamburger," +
          "#navbar-container .hamburger-menu," +
          "#navbar-container .menu-toggle," +
          "#navbar-container .mobile-menu-toggle," +
          "#navbar-container .nav-toggle," +
          "#navbar-container .navbar-toggle," +
          "#navbar-container [data-menu-toggle]," +
          "#navbar-container [aria-label='Toggle menu']," +
          "#navbar-container [aria-label='Open menu']," +
          "#navbar-container button[aria-controls]"
        );
      }

      function findMenu(navbar, toggle) {
        if (!navbar) return null;

        const controlledId = toggle && toggle.getAttribute("aria-controls");
        if (controlledId) {
          const controlled = document.getElementById(controlledId);
          if (controlled) return controlled;
        }

        return navbar.querySelector(
          ".nav-links, .navbar-links, .nav-menu, .navbar-menu, .mobile-menu, .mobile-nav, .menu, [data-menu]"
        );
      }

      function bindNavbarFallback() {
        if (document.body.dataset.organisationNavbarFallback === "true") return;
        document.body.dataset.organisationNavbarFallback = "true";

        document.addEventListener("click", function (event) {
          const toggle = closestToggle(event.target);
          if (!toggle) return;

          const navbar = document.getElementById("navbar-container");
          if (!navbar) return;

          const menu = findMenu(navbar, toggle);
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          const nextState = !expanded;

          toggle.classList.toggle("active", nextState);
          toggle.classList.toggle("open", nextState);
          toggle.setAttribute("aria-expanded", String(nextState));

          navbar.classList.toggle("active", nextState);
          navbar.classList.toggle("open", nextState);
          document.body.classList.toggle("nav-open", nextState);
          document.body.classList.toggle("menu-open", nextState);

          if (menu && menu !== toggle) {
            menu.classList.toggle("active", nextState);
            menu.classList.toggle("open", nextState);
            menu.classList.toggle("show", nextState);
            menu.setAttribute("aria-hidden", String(!nextState));
          }
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        bindNavbarFallback();
        bootFactions();
        setTimeout(bootFactions, 250);
        setTimeout(bootFactions, 1000);
        setTimeout(removeLoader, 1500);
      });

      window.addEventListener("load", () => {
        bootFactions();
        setTimeout(removeLoader, 300);
      });
    })();
  </script>

</body>
