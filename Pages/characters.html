<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="description"
    content="SSIA Vanguard Chronicles - Character Roster"
  >

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SSIA: Vanguard Chronicles - Characters</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Chakra+Petch:wght@300;400;500;600;700&family=Exo+2:wght@100;300;400;700;900&display=swap"
    rel="stylesheet"
  >

  <!-- MAIN CSS -->

  <link rel="stylesheet" href="../Styles/styles.css">
  <link rel="stylesheet" href="../Styles/characters.css">

</head>

<body>

  <!-- BACKGROUND -->

  <canvas id="bg-canvas"></canvas>

  <!-- NAVBAR -->

  <div id="navbar-container"></div>

  <!-- PAGE HERO -->

  <header class="characters-header">

    <div class="header-content">

      <span class="header-badge">
        SSIA DATABASE
      </span>

      <h1 class="header-title">
        Active Agents Roster
      </h1>

      <p class="header-subtitle">
        Vanguard Chronicles Operative Database
      </p>

    </div>

  </header>

  <!-- MAIN CONTENT -->

  <main class="section-wrapper">

    <section class="characters-section">

      <!-- TOP CONTROLS -->

      <div class="characters-topbar reveal">

        <!-- SEARCH -->

        <div class="search-wrap">

          <span class="search-icon">
            ⌕
          </span>

          <input
            type="text"
            id="character-search"
            placeholder="SEARCH_AGENT_DATABASE..."
            autocomplete="off"
          >

        </div>

        <!-- CHARACTER COUNT -->

        <div class="character-counter">

          <span id="character-count">
            Loading Agents...
          </span>

        </div>

      </div>

      <!-- GRID -->

      <div
        class="characters-grid"
        id="characters-container"
      >

        <!-- CHARACTER CARDS INJECTED BY JS -->

        <!--
        Example Generated Structure:

        <article class="character-card reveal">

          <div class="rarity-bar rarity-5"></div>

          <div class="card-clickable">

            <div class="portrait">

              <img src="agent.png" alt="Agent">

              <div class="character-overlay">
                <span>VIEW PROFILE</span>
              </div>

            </div>

            <div class="info">

              <div class="character-header">

                <h2>Jones Harrison</h2>

                <span class="rarity">
                  ⭐⭐⭐⭐⭐
                </span>

              </div>

              <div class="character-meta">

                <span>🔥 Pyro</span>
                <span>Pistols</span>

              </div>

              <div class="tag-group">

                <span class="tag">
                  DPS
                </span>

              </div>

              <p class="char-bio">
                Character description...
              </p>

            </div>

          </div>

          <div class="char-actions">

            <button class="btn-char-action fav-btn">
              ❤️ <span>0</span>
            </button>

            <button class="btn-char-action like-btn">
              👍 <span>0</span>
            </button>

            <button class="btn-char-action own-btn">
              ✅ <span>0</span>
            </button>

          </div>

        </article>
        -->

      </div>

    </section>

  </main>

  <!-- MODAL ROOT -->
  <!-- Dynamically generated by character.js -->

  <!-- FOOTER -->

  <div id="footer-container"></div>

  <!-- TOASTER -->

  <div id="toaster"></div>

  <!-- LOADING SCREEN -->

  <div id="page-loader">

    <div class="loader-content">

      <div class="loader-spinner"></div>

      <p>
        CONNECTING TO SSIA DATABASE...
      </p>

    </div>

  </div>

  <!-- SCRIPTS -->

  <script src="../Scripts/component-loader.js"></script>

  <script src="../Scripts/scripts.js"></script>

  <script src="../Scripts/character.js"></script>

  <!-- PAGE ENHANCEMENTS -->

  <script>

    /* CHARACTER COUNTER */

    function updateCharacterCount() {

      const cards = document.querySelectorAll(".character-card");

      const visibleCards = [...cards].filter(
        card => card.style.display !== "none"
      );

      const counter = document.getElementById("character-count");

      if (!counter) return;

      counter.textContent =
        `${visibleCards.length} ACTIVE AGENTS`;
    }

    /* OBSERVE SEARCH */

    document.addEventListener("DOMContentLoaded", () => {

      setTimeout(() => {

        updateCharacterCount();

        /* REMOVE LOADER */

        const loader = document.getElementById("page-loader");

        if (loader) {

          loader.classList.add("hide");

          setTimeout(() => {
            loader.remove();
          }, 500);

        }

      }, 400);

      /* SEARCH EVENT */

      const search = document.getElementById("character-search");

      if (search) {

        search.addEventListener("input", updateCharacterCount);

      }

    });

    /* UPDATE AFTER FILTER */

    const originalFilterCharacters = window.filterCharacters;

    window.filterCharacters = function () {

      if (originalFilterCharacters) {
        originalFilterCharacters();
      }

      updateCharacterCount();

    };

  </script>

</body>

</html>
